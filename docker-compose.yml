version: '3.9'

services:
  # ─────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gigshield_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigshield}
      POSTGRES_USER: ${POSTGRES_USER:-gigshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigshield123}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigshield} -d ${POSTGRES_DB:-gigshield}"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - gigshield_net

  # ─────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gigshield_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - gigshield_net

  # ─────────────────────────────────────
  # Node.js Backend (Express)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigshield_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      # Override docker-internal service URLs regardless of .env
      DATABASE_URL: postgresql://${POSTGRES_USER:-gigshield}:${POSTGRES_PASSWORD:-gigshield123}@postgres:5432/${POSTGRES_DB:-gigshield}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src   # hot-reload: only src/, not node_modules
    command: npm run dev
    networks:
      - gigshield_net

  # ─────────────────────────────────────
  # FastAPI ML Service (Python)
  # ─────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gigshield_mlservice
    restart: unless-stopped
    ports:
      - "8002:8001"
    volumes:
      - ./ml-service/app:/app/app                   # hot-reload app code
      - ml_models:/app/app/models                   # persist trained model artefacts
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    networks:
      - gigshield_net

  # ─────────────────────────────────────
  # React Frontend (Vite dev server)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: gigshield_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src   # hot-reload
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_SOCKET_URL: http://localhost:3001
    command: npm run dev
    networks:
      - gigshield_net

# ─────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local

# ─────────────────────────────────────
# Network
# ─────────────────────────────────────
networks:
  gigshield_net:
    driver: bridge
