version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gigshield-db
    environment:
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield123
      POSTGRES_DB: gigshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigshield-backend
    environment:
      DATABASE_URL: postgresql://gigshield:gigshield123@postgres:5432/gigshield?sslmode=disable
      JWT_SECRET: gigshield-super-secret-jwt-key-2024
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-demo_key}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-demo_key}
      ML_SERVICE_URL: http://ml-service:8000
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    command: >
      sh -c "npm run seed && npm start"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gigshield-ml
    ports:
      - "8000:8000"
    environment:
      PORT: 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigshield-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
